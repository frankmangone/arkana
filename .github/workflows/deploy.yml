name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: ""
      NEXT_PUBLIC_BASE_PATH: ""
      NEXT_PUBLIC_SITE_URL: "https://arkana.blog"
      NEXT_PUBLIC_API_URL: "https://arkana.blog"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      NEXT_PUBLIC_GOOGLE_REDIRECT_URI: ${{ secrets.NEXT_PUBLIC_GOOGLE_REDIRECT_URI }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List files (debug)
        run: ls -la

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Check pnpm version
        run: pnpm --version

      - name: Check if lockfile exists (debug)
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            echo "Lockfile exists"
            cat pnpm-lock.yaml | head -n 20
          else
            echo "Lockfile does not exist"
            find . -name "pnpm-lock.yaml"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies without frozen lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Pull content from DB
        env:
          VULTR_HOST: ${{ secrets.VULTR_HOST }}
          VULTR_USER: ${{ secrets.VULTR_USER }}
          VULTR_SSH_KEY: ${{ secrets.VULTR_SSH_KEY }}
          DATABASE_PATH: ${{ secrets.DATABASE_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$VULTR_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VULTR_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key "$VULTR_USER@$VULTR_HOST" \
            "sqlite3 -json \"$DATABASE_PATH\" \"SELECT lang, path, content FROM post_content WHERE visible = 1\"" \
            > post_content_export.json

          node scripts/pull-content.js post_content_export.json
          rm -f ~/.ssh/deploy_key post_content_export.json

      - name: Pre-calculate content hashes
        run: node scripts/calculate-hashes.js

      - name: Print environment variables (debug)
        run: |
          echo "BASE_PATH: $BASE_PATH"
          echo "NEXT_PUBLIC_BASE_PATH: $NEXT_PUBLIC_BASE_PATH"
          echo "NEXT_PUBLIC_API_URL: $NEXT_PUBLIC_API_URL"
          echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID: $NEXT_PUBLIC_GOOGLE_CLIENT_ID"
          echo "NEXT_PUBLIC_GOOGLE_REDIRECT_URI: $NEXT_PUBLIC_GOOGLE_REDIRECT_URI"

      - name: Build with Next.js
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  clear-cache:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Clear nginx cache
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          script: sudo /usr/local/bin/clear-cache.sh

  index-new-articles:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new articles
        id: detect
        run: |
          new_paths=$(git diff HEAD~1 HEAD --name-only --diff-filter=A -- src/content/en/ \
            | grep '\.md$' \
            | sed 's|src/content/en/||; s|\.md$||')
          echo "new_paths=$new_paths" >> $GITHUB_OUTPUT

      - name: Insert new articles into DB
        if: steps.detect.outputs.new_paths != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          envs: NEW_PATHS,DATABASE_PATH
          script: |
            for path_id in $NEW_PATHS; do
              sqlite3 "$DATABASE_PATH" \
                "INSERT OR IGNORE INTO posts (path_identifier) VALUES ('$path_id');"
              echo "Indexed: $path_id"
            done
        env:
          NEW_PATHS: ${{ steps.detect.outputs.new_paths }}
          DATABASE_PATH: ${{ secrets.DATABASE_PATH }}